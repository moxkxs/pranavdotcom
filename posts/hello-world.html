                <p>A deep dive into how implied volatility surfaces move and deform in response to market events. Examining the relationship between skew, term structure, and underlying price action.</p>
                
                <h3 id="what-is">What Is the Vol Surface?</h3>
                
                <p>The volatility surface is a three-dimensional representation of implied volatility as a function of two variables: <strong>strike price</strong> (or moneyness) and <strong>time to expiration</strong>. It's the market's way of telling you that Black-Scholes is wrong &mdash; or more precisely, that volatility is not constant across strikes and expirations.</p>
                
                <figure class="post-figure">
                    <img src="../images/project-vol-surface.jpg" alt="Example volatility surface">

                </figure>
                
                <p>The surface encodes an enormous amount of information about market expectations: tail risk pricing, supply-demand imbalances in the options market, and forward-looking views on realized volatility.</p>

                <h3 id="skew">Skew Dynamics</h3>
                
                <p>Equity skew exists because of structural demand: portfolio managers buy puts for protection, and market makers charge a premium for bearing that tail risk. But skew is not static. It steepens and flattens in predictable ways:</p>
                
                <ul>
                    <li><strong>Spot down, skew up</strong> &mdash; As the market sells off, demand for downside protection spikes.</li>
                    <li><strong>Spot up, skew flattens</strong> &mdash; In rallies, put demand eases and the surface compresses.</li>
                    <li><strong>Vol-of-vol spikes</strong> &mdash; During dislocations, the entire surface becomes unstable.</li>
                </ul>
                
                <h3 id="term-structure">Term Structure Regimes</h3>
                
                <p><strong>Contango (normal)</strong> &mdash; longer-dated vol is higher than shorter-dated. This is the default state. <strong>Backwardation (inverted)</strong> &mdash; front-month vol exceeds back-month. This signals acute near-term stress.</p>
                
                <pre><code>def term_structure_slope(surface, front, back):
    """Positive = contango, Negative = backwardation"""
    front_atm = surface.get_atm_vol(front)
    back_atm = surface.get_atm_vol(back)
    return (back_atm - front_atm) / (back - front)</code></pre>
