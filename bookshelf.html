<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookshelf - Pranav Kandlakunta</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <script src="js/theme-init.js"></script>
</head>
<body>
    <canvas id="dotGrid"></canvas>
    
    <header id="site-header"></header>
    
    <main>
        <h2 class="page-title">Bookshelf</h2>
        
        <p class="intro">
            A sampling of the books you would find strewn across my room
        </p>
        
        <div class="separator"></div>
        
        <!-- Reading Stats -->
        <div class="reading-stats">
            <div class="stat-item">
                <span class="stat-number">220</span>
                <span class="stat-label">Want to Read</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="stat-completed">7</span>
                <span class="stat-label">Have Read</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="stat-reading">3</span>
                <span class="stat-label">Reading</span>
            </div>
        </div>
        
        <!-- Currently Reading -->
        <section class="books-section">
            <h3 class="section-heading">
                <span class="reading-indicator active"></span>
                Currently Reading
            </h3>
            <div id="books-reading"></div>
        </section>
        
        <!-- Up Next -->
        <section class="books-section">
            <h3 class="section-heading">
                <span class="reading-indicator queue"></span>
                Up Next
            </h3>
            <div id="books-queue" class="book-list-compact"></div>
        </section>
        
        <!-- Completed -->
        <section class="books-section">
            <h3 class="section-heading">
                <span class="reading-indicator completed"></span>
                Completed
            </h3>
            <div id="books-completed" class="book-list-compact"></div>
        </section>
        
        <div id="site-footer"></div>
    </main>
    
    <script src="js/components.js"></script>
    <script src="js/script.js"></script>
    <script src="js/bookshelf.js"></script>
</body>
</html>
